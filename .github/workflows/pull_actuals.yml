name: Pull Actuals (daily)

on:
  schedule:
    # Run at 10 AM UTC (5 AM Central) daily
    # NCEI data typically finalizes 1-4 days after observation
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD). Leave blank for incremental update."
        required: false
        default: ""
      end_date:
        description: "End date (YYYY-MM-DD). Leave blank for yesterday."
        required: false
        default: ""

jobs:
  pull-actuals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"
          use-public-rspm: true

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            httr
            jsonlite
            dplyr
            lubridate
            readr

      - name: Pull actuals
        env:
          NCEI_TOKEN: ${{ secrets.NCEI_TOKEN }}
        run: |
          START="${{ github.event.inputs.start_date }}"
          END="${{ github.event.inputs.end_date }}"
          if [ -n "$START" ] && [ -n "$END" ]; then
            Rscript R/pull_actuals.R "$START" "$END"
          elif [ -n "$START" ]; then
            Rscript R/pull_actuals.R "$START"
          else
            Rscript R/pull_actuals.R
          fi

      - name: Commit updated actuals CSVs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update actuals [skip ci]"
          file_pattern: "data/actuals_*.csv"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
